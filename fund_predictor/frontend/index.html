<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="基金T+1净值涨跌幅区间预测系统 - 量化决策平台">
  <title>QuantDesk - 基金预测系统</title>
  <style>
    /* 预加载样式，避免白屏 */
    body {
      margin: 0;
      padding: 0;
      background: #0b1220;
      color: #f8fafc;
      font-family: 'Inter', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #app-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b1220;
      z-index: 9999;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      margin-top: 16px;
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- 加载状态 -->
  <div id="app-loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">系统初始化中...</div>
  </div>

  <!-- Vue 应用挂载点 -->
  <div id="app"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
