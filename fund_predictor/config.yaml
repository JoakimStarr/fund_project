# 基金预测系统配置文件
# 集中管理所有可调参数，避免魔法数字散落各处

# === 数据获取 ===
data:
  cache_stale_days: 10
  min_train_rows: 220
  fetch_timeout_seconds: 20
  fetch_max_workers: 5
  fund_nav_fallback_enabled: true
  index_fallback_enabled: true

# === 特征工程 ===
feature:
  lookback_lags: [1, 2, 3, 5, 10]
  rolling_windows: [5, 10, 20, 60]
  beta_window: 20
  volatility_window: 20
  style_window: 60

# === 因子预筛选 ===
screening:
  ic_threshold: 0.02
  vif_threshold: 10.0
  icir_threshold: 0.5
  decay_window: 20

# === 模型训练 ===
model:
  train_split_ratio: [0.55, 0.22, 0.13, 0.10]
  sample_weight_halflife: 60
  walk_forward_train_months: 24
  walk_forward_valid_months: 3
  walk_forward_step_months: 1
  walk_forward_min_rounds: 12

  # GPU加速配置
  use_gpu: false                    # 是否启用GPU加速
  gpu_device: "cuda:0"              # GPU设备 (cuda:0 / cuda:1 / cpu)
  gpu_min_samples: 10000            # 最小样本数才启用GPU (小数据集CPU更快)

  # 回归模型参数
  ridge_alpha: 1.0
  elasticnet_alpha: 0.01
  n_estimators: 120
  max_depth: 5
  learning_rate: 0.05
  min_samples_leaf: 10

  # 方向模型校准
  direction_calibration_method: "isotonic"

  # Stacking集成
  stacking_alpha: 1.0

# === 区间预测 ===
interval:
  default_alpha: 0.10
  regime_groups: ["low", "medium_low", "medium_high", "high"]
  quantiles: [0.70, 0.80, 0.90, 0.99]

# === 债券因子（物理先验）===
bond:
  duration_estimate:
    bond_pure: 3.0
    bond_mixed: 2.5
    bond_convertible: 1.5
  daily_fee: 0.000003

# === 净值约束 ===
nav_constraints:
  hybrid_equity: 0.20
  equity_active: 0.20
  hybrid_balanced: 0.15
  hybrid_bond: 0.10
  hybrid_flexible: 0.20
  bond_pure: 0.05
  bond_mixed: 0.08
  bond_convertible: 0.20

# === 冷启动 ===
cold_start:
  group_model_days: 250
  fine_tune_days: 180
  individual_model_days: 180

# === 监控与退化 ===
monitoring:
  mae_alert_sigma: 2.0
  direction_accuracy_threshold: 0.50
  consecutive_bad_days: 5
  bias_detection_window: 10

# === API ===
api:
  version: "v1"
  request_timeout: 30
  max_concurrent_tasks: 3

# === 日志系统 ===
logging:
  level: "INFO"

  # 全局日志目录（相对于项目根目录）
  dir: "logs"

  # 控制台输出
  console:
    enabled: true
    level: "INFO"
    colorize: true

  # 文件日志通用设置
  file:
    encoding: "utf-8"
    max_bytes: 10485760
    backup_count: 30
    rotation_when: "midnight"

  # 各日志文件配置
  handlers:
    app:
      filename: "app.log"
      level: "INFO"
      format: "detailed"
    api:
      filename: "api.jsonl"
      level: "INFO"
      format: "json"
    train:
      filename: "train.log"
      level: "DEBUG"
      format: "detailed"
    error:
      filename: "error.log"
      level: "ERROR"
      format: "detailed"
    audit:
      filename: "audit.jsonl"
      level: "INFO"
      format: "json"
    perf:
      filename: "perf.jsonl"
      level: "INFO"
      format: "json"

  # 第三方库日志级别（降低噪音）
  third_party:
    uvicorn: "WARNING"
    sqlalchemy: "WARNING"
    akshare: "WARNING"
    requests: "WARNING"

  # 采样：高频接口按比例记录（避免日志爆炸）
  sampling:
    enabled: true
    rate: 0.1
    exclude_paths: ["/health", "/docs", "/redoc", "/openapi.json"]

  # 敏感信息脱敏
  sanitize:
    mask_fund_code: false
    mask_request_id: false

# ====================================================
# ★ AI 分析模块配置（v2.6.0 新增）
# ====================================================
ai_provider:

  # --- 主 Provider ---
  primary:
    provider: "glm"                  # 可选: "glm" | "siliconflow"
    api_key: "${GLM_API_KEY}"        # 从环境变量读取，禁止硬编码
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-4-flash"            # 推荐: glm-4-flash（快速、成本低）
                                    # 备选: glm-4-air（更强，成本略高）
    timeout_seconds: 15             # 单次请求超时（AI推理通常3-8s）
    max_tokens: 512                 # 限制输出长度（分析报告150字够用）
    temperature: 0.3                # 低随机性，保证输出稳定可解析

  # --- 备用 Provider（主 Provider 失败时自动切换）---
  fallback:
    provider: "siliconflow"
    api_key: "${SILICONFLOW_API_KEY}"
    base_url: "https://api.siliconflow.cn/v1"
    model: "Qwen/Qwen2.5-7B-Instruct"  # 推荐: 免费额度充足
                                        # 备选: "deepseek-ai/DeepSeek-V2.5"
    timeout_seconds: 20
    max_tokens: 512
    temperature: 0.3

  # --- 调用策略 ---
  retry_times: 2                   # 同一 Provider 的重试次数
  retry_delay_seconds: 1           # 重试等待时间
  fallback_on_error: true          # 主 Provider 失败时是否切换备用
  cache_ttl: "day"                 # 缓存有效期: "day"=当日有效（次日清除）

  # --- 输出格式约束 ---
  force_json_output: true          # 强制要求 AI 输出 JSON（Prompt 中硬约束）
  allowed_actions:                 # suggested_action 枚举白名单
    - "增持"
    - "持有"
    - "减持"
    - "观望"

# ====================================================
# ★ 新闻聚合配置（v2.6.0 新增）
# ====================================================
news_service:

  # --- AKShare 新闻源配置 ---
  sources:
    cls:                           # 财联社电报
      enabled: true
      akshare_func: "stock_telegraph_cls_em"
      max_items: 50                # 每次拉取条数
      relevance_min_score: 0.3     # 最低相关性分数（0-1）
    em:                            # 东方财富个股新闻
      enabled: true
      akshare_func: "stock_news_em"
      max_items: 20
      relevance_min_score: 0.4
    sina:                          # 新浪财经快讯
      enabled: false               # 默认关闭（数据质量较低）
      akshare_func: "stock_news_sina"
      max_items: 20
      relevance_min_score: 0.5

  # --- 相关性计算 ---
  keyword_sources:
    - "fund_name"                  # 基金名称关键词
    - "top5_holdings"              # 前5大重仓股名称
    - "fund_type_keywords"         # 基金类型关键词（如"医药""科技"）
  max_news_for_ai: 3               # 送入 AI 的最大新闻条数
  max_news_for_display: 5          # 前端展示的最大条数

  # --- 缓存 ---
  cache_minutes: 10                # 新闻列表缓存（分钟），盘中频繁访问时避免重复拉取
  fetch_timeout_seconds: 8         # 单次 AKShare 新闻请求超时

# === 数据源配置（v3.0.0 优化）===
data_sources:
  enabled:
    xueqiu: true                  # 雪球网（第一优先级）
    sina: true                    # 新浪（第二优先级）
    tencent: true                 # 腾讯（第三优先级）
    eastmoney: true               # 东财（第四优先级）
    sohu: true                    # 搜狐（第五优先级）

  request_interval:                # 请求间隔控制（秒），避免被封IP
    xueqiu: 2.0
    sina: 1.5
    tencent: 1.5
    eastmoney: 2.0
    sohu: 2.5

  max_retry_times: 3              # 最大重试次数
  retry_interval: 1.0             # 重试间隔（秒）