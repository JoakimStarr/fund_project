<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>决策中心 - Quant Dashboard</title>
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- 侧边导航 -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <div class="logo">QuantDesk</div>
        <div class="logo-subtitle">量化决策系统</div>
      </div>
      <ul class="nav-menu">
        <li class="nav-item active" data-page="dashboard">
          <a href="/index.html">
            <span class="nav-icon">🎯</span>
            <span class="nav-text">决策中心</span>
          </a>
        </li>
        <li class="nav-item" data-page="exposure">
          <a href="/exposure.html">
            <span class="nav-icon">📊</span>
            <span class="nav-text">资产暴露</span>
          </a>
        </li>
        <li class="nav-item" data-page="backtest">
          <a href="/backtest.html">
            <span class="nav-icon">📈</span>
            <span class="nav-text">回测诊断</span>
          </a>
        </li>
        <li class="nav-item" data-page="model">
          <a href="/model.html">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">模型系统</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="topbar">
        <div class="topbar-title">
          <h1>决策中心</h1>
          <div class="topbar-subtitle">T+1 风险预测与方向判断</div>
        </div>
      </header>

      <!-- 控制区 -->
      <section class="control-section">
        <div class="control-row">
          <div class="input-field">
            <label>基金代码</label>
            <input id="fundCode" type="text" value="018956" maxlength="12">
          </div>
          <button id="predictBtn" class="btn btn-primary">预测</button>
          <button id="trainBtn" class="btn btn-secondary">训练并预测</button>
          <label class="switch-label">
            <input id="forceRetrain" type="checkbox">
            <span class="switch-slider"></span>
            <span>强制重训</span>
          </label>
        </div>
        <div id="errorBox" class="error-card hidden"></div>
        <div id="statusBox" class="text-muted mt-4"></div>
      </section>

      <!-- 空状态 -->
      <section id="emptyState" class="empty-state">
        <div class="empty-icon">🎯</div>
        <div class="empty-title">输入基金代码开始预测</div>
        <div class="empty-desc">系统将分析模型可信度、方向信号和风险区间，辅助您的投资决策</div>
      </section>

      <!-- 预测结果 -->
      <section id="resultSection" class="hidden">
        <!-- 主结论卡 -->
        <div class="conclusion-card">
          <div class="conclusion-main">
            <div class="conclusion-label">当前结论</div>
            <div id="conclusionValue" class="conclusion-value">-</div>
            <div id="conclusionSubtitle" class="conclusion-subtitle">-</div>
            <div id="reliabilityBadge" class="reliability-badge">-</div>
          </div>
        </div>

        <!-- 方向信号 -->
        <div class="direction-grid">
          <div class="direction-item" id="upItem">
            <div class="direction-label">上涨概率</div>
            <div id="upProbability" class="direction-value">-</div>
          </div>
          <div class="direction-item" id="downItem">
            <div class="direction-label">下跌概率</div>
            <div id="downProbability" class="direction-value">-</div>
          </div>
          <div class="direction-item" id="neutralItem">
            <div class="direction-label">中性区间</div>
            <div id="neutralRange" class="direction-value">-</div>
          </div>
        </div>

        <!-- 核心区间 -->
        <div class="interval-section">
          <div class="interval-card">
            <div class="interval-header">
              <span class="interval-title">80% 收益区间</span>
              <span class="interval-confidence">置信度 80%</span>
            </div>
            <div class="interval-bar">
              <div id="interval80Range" class="interval-range" style="left: 30%; width: 40%;"></div>
              <div id="interval80Center" class="interval-center" style="left: 50%;"></div>
            </div>
            <div class="interval-labels">
              <span id="interval80Lower" class="negative">-</span>
              <span id="interval80Upper" class="positive">-</span>
            </div>
          </div>

          <div class="interval-card">
            <div class="interval-header">
              <span class="interval-title">90% 收益区间</span>
              <span class="interval-confidence">置信度 90%</span>
            </div>
            <div class="interval-bar">
              <div id="interval90Range" class="interval-range" style="left: 25%; width: 50%;"></div>
              <div id="interval90Center" class="interval-center" style="left: 50%;"></div>
            </div>
            <div class="interval-labels">
              <span id="interval90Lower" class="negative">-</span>
              <span id="interval90Upper" class="positive">-</span>
            </div>
          </div>
        </div>

        <!-- 辅助点预测 -->
        <div class="auxiliary-prediction">
          <span class="auxiliary-label">辅助点预测</span>
          <span id="pointPrediction" class="auxiliary-value">-</span>
        </div>

        <!-- 关键可信度指标 -->
        <div class="card" style="margin-top: 24px;">
          <div class="card-title">关键可信度指标</div>
          <div class="metrics-grid">
            <div class="metric-item">
              <div class="metric-name">模型改进度</div>
              <div id="metricImprovement" class="metric-number">-</div>
            </div>
            <div class="metric-item">
              <div class="metric-name">预测-真实相关</div>
              <div id="metricCorr" class="metric-number">-</div>
            </div>
            <div class="metric-item">
              <div class="metric-name">方向 AUC</div>
              <div id="metricAuc" class="metric-number">-</div>
            </div>
            <div class="metric-item">
              <div class="metric-name">Proxy R²</div>
              <div id="metricProxyR2" class="metric-number">-</div>
            </div>
          </div>
        </div>
      </section>

      <!-- 免责声明 -->
      <footer class="disclaimer">
        本系统仅用于量化研究和模型实验，不构成投资建议。预测结果仅供参考，投资有风险，决策需谨慎。
      </footer>
    </main>
  </div>

  <!-- 脚本 -->
  <script src="/assets/common.js"></script>
  <script src="/assets/api.js"></script>
  <script src="/assets/dashboard.js"></script>
</body>
</html>
