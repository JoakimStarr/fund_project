<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今日估值 / 盘中跟踪 - 量化研究工作台</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="app-container">
    <nav class="sidebar">
      <div class="sidebar-header">
        <div class="logo">QuantDesk</div>
        <div class="subtitle">量化研究工作台</div>
      </div>
      <ul class="nav-menu">
        <li class="nav-item" data-page="dashboard"><a href="/index.html"><span class="nav-icon">📊</span><span class="nav-text">总览预测</span></a></li>
        <li class="nav-item active" data-page="intraday"><a href="/intraday.html"><span class="nav-icon">📈</span><span class="nav-text">今日估值</span></a></li>
        <li class="nav-item" data-page="exposure"><a href="/exposure.html"><span class="nav-icon">🎯</span><span class="nav-text">资产暴露</span></a></li>
        <li class="nav-item" data-page="backtest"><a href="/backtest.html"><span class="nav-icon">📉</span><span class="nav-text">回测诊断</span></a></li>
        <li class="nav-item" data-page="model"><a href="/model.html"><span class="nav-icon">🤖</span><span class="nav-text">模型训练</span></a></li>
      </ul>
    </nav>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>今日估值 / 盘中跟踪</h1>
          <p class="subtitle">使用上一交易日基金净值和今日盘中重仓股行情估算今日尚未更新净值</p>
        </div>
      </header>

      <section class="control-section">
        <div class="control-row">
          <label class="field">
            <span>基金代码</span>
            <input id="fundCode" value="018956" maxlength="12">
          </label>
          <button id="loadBtn" class="btn btn-primary">加载</button>
        </div>
        <div class="notice-card">
          <strong>模块状态：预留中</strong>
          <p>该模式使用上一交易日基金净值和今日盘中重仓股行情估算今日尚未更新净值，不同于 T+1 预测。</p>
        </div>
      </section>

      <section class="content-grid">
        <div class="metric-card">
          <div class="metric-label">上一净值日期</div>
          <div class="metric-value" id="lastNavDate">盘中估值模块尚未启用</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">上一净值</div>
          <div class="metric-value" id="lastNav">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">最新行情时间</div>
          <div class="metric-value" id="latestQuoteTime">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">估算今日收益</div>
          <div class="metric-value" id="estimatedReturn">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">估算今日净值</div>
          <div class="metric-value" id="estimatedNav">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">数据完整性</div>
          <div class="metric-value" id="dataCompleteness">-</div>
        </div>
      </section>

      <section class="card">
        <div class="section-title">Top10 盘中贡献</div>
        <table class="data-table">
          <thead>
            <tr><th>股票</th><th>权重</th><th>涨跌</th><th>贡献</th></tr>
          </thead>
          <tbody id="top10Contribution">
            <tr><td colspan="4" class="placeholder-text">盘中估值模块尚未启用</td></tr>
          </tbody>
        </table>
      </section>

      <section class="card">
        <div class="section-title">主题代理贡献</div>
        <table class="data-table">
          <thead>
            <tr><th>主题</th><th>暴露</th><th>涨跌</th><th>贡献</th></tr>
          </thead>
          <tbody id="themeContribution">
            <tr><td colspan="4" class="placeholder-text">盘中估值模块尚未启用</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="/assets/common.js"></script>
  <script src="/assets/api.js"></script>
  <script src="/assets/pages/intraday.js"></script>
</body>
</html>
